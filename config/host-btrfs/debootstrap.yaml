mazarini_rescue_debootstrap:
  debootstrap:
    suite: trixie
    arch: amd64
    mirror: "http://deb.debian.org/debian"
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    variant: minbase
    # packages to include in the debootstrap image
    include:
      - dialog
      - zstd
